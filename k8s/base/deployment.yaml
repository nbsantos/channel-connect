apiVersion: apps/v1
kind: Deployment
metadata:
  name: channel-connect
  namespace: channel-connect
  labels:
    app: channel-connect
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: channel-connect
  template:
    metadata:
      labels:
        app: channel-connect
      annotations:
        channel-connect.io/deployed-at: "pending"
    spec:
      serviceAccountName: channel-connect
      securityContext:
        fsGroup: 1001
      containers:
        - name: channel-connect
          image: channel-connect:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: channel-connect-config
            - secretRef:
                name: channel-connect-secrets
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
