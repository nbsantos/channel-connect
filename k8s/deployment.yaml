apiVersion: apps/v1
kind: Deployment
metadata:
  name: channel-connect
  namespace: channel-connect
  labels:
    app: channel-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: channel-connect
  template:
    metadata:
      labels:
        app: channel-connect
      annotations:
        channel-connect.io/deployed-at: "pending"
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: channel-connect
          image: channel-connect:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: channel-connect-config
            - secretRef:
                name: channel-connect-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: channel-connect-data
