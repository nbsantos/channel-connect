services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: channel
      POSTGRES_PASSWORD: channel
      POSTGRES_DB: channel_connect
    volumes:
      - channel_connect_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U channel -d channel_connect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  channel_connect_pg:
